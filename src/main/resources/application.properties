# 應用程式設定
server.port=8077

# Session 設定 (使用 JDBC 儲存)
spring.session.jdbc.enabled=true
spring.session.jdbc.initialize-schema=always
spring.session.timeout=30m

# SQLite Database
spring.datasource.url=jdbc:sqlite:/tmp/primaryenglish.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
# none: 完全由 Flyway 遷移腳本管理 schema，Hibernate 不做自動建表/驗證
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway-like 数据库迁移設定 (SQLite 兼容)
# 启用迁移，自动执行 db/migration/V{version}__{description}.sql
flyway.enabled=true
flyway.locations=classpath:db/migration
flyway.baseline-on-migrate=true
flyway.baseline-version=0

# 資料初始化（關閉 Spring Boot 自動執行，改由 DataInitializer.java 控制）
spring.sql.init.mode=never

# Thymeleaf 快取關閉（開發模式）
spring.thymeleaf.cache=false

# 信任 Cloudflare Tunnel / 反向代理的 X-Forwarded headers
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# AI 模型預設設定
# 設為 true：允許使用者在個人資料中自訂 AI 模型
# 未設定或設為 false：強制使用系統預設模型（ollama gemma4:31b-cloud），使用者不需設定
ai.user-model-selection.enabled=false
ai.default-model.provider=ollama
ai.default-model.model=gemma4:31b-cloud
ai.default-model.url=http://10.0.0.186:11434
