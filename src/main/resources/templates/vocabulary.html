<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>單字學習</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb + Title -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-primary-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-vocabulary text-primary fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-primary mb-0">單字學習</h2>
                <p class="text-muted mb-0" th:if="${currentCategory != null}">
                    主題：<span class="fw-bold text-primary" th:text="${currentCategory.name}"></span>
                    <small class="text-muted ms-1" th:text="'(' + ${currentCategory.nameEn} + ')'"></small>
                </p>
            </div>
        </div>
        <div>
            <a th:href="@{/quiz/listen(category=${currentCategory?.id})}" class="btn btn-info fw-bold me-2 shadow-sm">
                <span class="nav-icon-wrap me-1"><i class="ti ti-headphones"></i></span>聽力測驗
            </a>
            <a th:href="@{/quiz/spell(category=${currentCategory?.id})}" class="btn btn-warning fw-bold shadow-sm">
                <span class="nav-icon-wrap me-1"><i class="ti ti-pencil"></i></span>拼字測驗
            </a>
        </div>
    </div>

    <!-- Category Filter -->
    <div class="mb-4">
        <div class="d-flex align-items-center mb-2">
            <i class="ti ti-filter text-muted me-2"></i>
            <span class="text-muted small fw-bold">主題篩選</span>
        </div>
        <div class="btn-group flex-wrap" role="group">
            <a th:href="@{/vocabulary}" class="btn btn-outline-primary category-pill"
                th:classappend="${currentCategory == null} ? 'active' : ''">
                <i class="ti ti-apps me-1"></i>全部
            </a>
            <a th:each="cat : ${categories}"
               th:href="@{/vocabulary(category=${cat.id})}"
               th:text="${cat.name}"
               class="btn btn-outline-primary category-pill"
               th:classappend="${currentCategory != null && currentCategory.id == cat.id} ? 'active' : ''"></a>
        </div>
    </div>

    <!-- Vocabulary Cards -->
    <div class="row g-4" th:if="${vocabularies != null && !vocabularies.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="vocab, vocabStat : ${vocabularies}">
            <div class="card vocab-card h-100 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="vocab-english fw-bold fs-3 text-primary" th:text="${vocab.english}">dog</div>
                        <button class="btn btn-outline-primary btn-sm rounded-circle speech-btn"
                                th:data-text="${vocab.english}"
                                title="朗讀單字">
                            <i class="ti ti-volume"></i>
                        </button>
                    </div>
                    <div class="text-muted fst-italic mb-2 d-flex align-items-center">
                        <i class="ti ti-speakerphone text-muted me-2"></i>
                        <span th:text="${vocab.phonetic}">/dɔɡ/</span>
                    </div>
                    <div class="vocab-chinese fs-5 fw-bold mb-3 text-dark">
                        <span class="badge bg-warning text-dark me-2">中文</span>
                        <span th:text="${vocab.chinese}">狗</span>
                    </div>
                    <!-- Vocab Image -->
                    <div class="vocab-image-wrapper mb-3 text-center" th:if="${vocab.image != null}">
                        <img th:src="@{${vocab.image}}" class="rounded-3 shadow-sm" style="max-height: 120px; width: auto;"
                             th:alt="${vocab.english}">
                    </div>
                    <hr class="my-3 opacity-50">
                    <div class="example-section">
                        <div class="d-flex align-items-center mb-2">
                            <i class="ti ti-message-circle text-info me-2"></i>
                            <span class="text-muted small fw-bold">例句</span>
                            <button class="btn btn-outline-info btn-xs ms-2 speech-btn"
                                    th:data-text="${vocab.exampleEn}"
                                    title="朗讀例句">
                                <i class="ti ti-volume"></i>
                            </button>
                        </div>
                        <p class="example-en mb-1 fw-medium" th:text="${vocab.exampleEn}">The dog is running in the park.</p>
                        <p class="example-cn text-muted small" th:text="${vocab.exampleCn}">那隻狗正在公園裡奔跑。</p>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-4">
                    <span class="badge bg-primary-soft text-primary">
                        <i class="ti ti-number me-1"></i>
                        <span th:text="${vocabStat.count}">1</span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center py-5 text-muted" th:if="${vocabularies == null || vocabularies.isEmpty()}">
        <div class="empty-state">
            <i class="ti ti-inbox display-1 text-muted"></i>
            <p class="mt-3 fs-5">目前沒有單字資料</p>
            <a th:href="@{/}" class="btn btn-primary mt-2">
                <i class="ti ti-home me-1"></i>回首頁
            </a>
        </div>
    </div>

</div>

<script layout:fragment="scripts">
    // 單字頁面自動朗讀按鈕綁定
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.speech-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                var text = this.getAttribute('data-text');
                if (text) {
                    speak(text, 'en-US');
                }
            });
        });
    });
</script>

</body>
</html>
