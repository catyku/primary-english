<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>註冊</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5 col-xl-4">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- Header -->
                <div class="text-center py-5 position-relative"
                     style="background: linear-gradient(135deg, #ec4899 0%, #f59e0b 50%, #f97316 100%);">
                    <div class="position-absolute top-0 start-0 p-3 opacity-25" style="font-size: 4rem;">🎉</div>
                    <div class="position-absolute bottom-0 end-0 p-3 opacity-25" style="font-size: 3rem;">🌟</div>

                    <div class="position-relative">
                        <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow"
                             style="width: 80px; height: 80px;">
                            <i class="ti ti-user-plus text-warning fs-1"></i>
                        </div>
                        <h2 class="fw-bold text-white m-0">新朋友！</h2>
                        <p class="text-white-75 mb-0 mt-2">建立帳號開始學習 🚀</p>
                    </div>
                </div>

                <!-- Body -->
                <div class="card-body p-4 p-md-5">

                    <div th:if="${error}" class="alert alert-danger rounded-3 d-flex align-items-center">
                        <i class="ti ti-alert-circle me-2 fs-5"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/do-register}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">
                                <i class="ti ti-user me-1 text-primary"></i>使用者名稱 *
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="ti ti-user text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control form-control-lg bg-light border-start-0 ps-0"
                                       required placeholder="3-20 個字元" minlength="3" maxlength="20">
                            </div>
                            <small class="text-muted"><i class="ti ti-info-circle me-1"></i>3-20 個字元，不含空格</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">
                                <i class="ti ti-lock me-1 text-primary"></i>密碼 *
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="ti ti-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control form-control-lg bg-light border-start-0 ps-0"
                                       required placeholder="至少 4 個字元" minlength="4">
                            </div>
                            <small class="text-muted"><i class="ti ti-shield me-1"></i>至少 4 個字元</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">
                                <i class="ti ti-id-badge me-1 text-primary"></i>暱稱
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="ti ti-smile text-muted"></i>
                                </span>
                                <input type="text" name="displayName" class="form-control form-control-lg bg-light border-start-0 ps-0"
                                       placeholder="怎麼稱呼你？（選填）">
                            </div>
                        </div>

                        <!-- 🤖 AI 設定（選填） -->
                        <div class="mb-4">
                            <div class="d-flex align-items-center mb-3" style="cursor:pointer;"
                                 onclick="document.getElementById('aiSettings').classList.toggle('d-none')">
                                <hr class="flex-grow-1">
                                <span class="mx-3 text-muted fw-bold">
                                    <i class="ti ti-sparkles me-1 text-warning"></i>AI 文章生成設定（選填）
                                    <i class="ti ti-chevron-down ms-1"></i>
                                </span>
                                <hr class="flex-grow-1">
                            </div>
                            <div id="aiSettings" class="d-none">
                                <div class="alert alert-info rounded-3 py-2 mb-3">
                                    <small><i class="ti ti-info-circle me-1"></i>設定後可在文章管理中使用 AI 自動生成閱讀短文與題目。API Key 只存於你的帳號，不會上傳到 Git。</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">
                                        <i class="ti ti-brain me-1 text-warning"></i>AI 供應商
                                    </label>
                                    <select name="apiProvider" class="form-select form-select-lg bg-light"
                                            onchange="updateDefaultModel(this.value)">
                                        <option value="">-- 請選擇 --</option>
                                        <option value="openrouter">🌐 OpenRouter（免費/付費）</option>
                                        <option value="gemini">🔷 Google Gemini（免費額度）</option>
                                        <option value="openai">🤖 OpenAI（付費）</option>
                                        <option value="github">🐙 GitHub Copilot（需訂閱）</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">
                                        <i class="ti ti-key me-1 text-warning"></i>API Key
                                    </label>
                                    <input type="password" name="apiKey" class="form-control form-control-lg bg-light"
                                           placeholder="sk-or-xxxxx 或 gsk_xxxxx">
                                    <small class="text-muted">金鑰只保存在你的帳號中，不會公開</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">
                                        <i class="ti ti-settings me-1 text-warning"></i>模型名稱
                                    </label>
                                    <input type="text" name="apiModel" id="apiModel" class="form-control form-control-lg bg-light"
                                           placeholder="使用預設模型">
                                    <small class="text-muted" id="modelHint">選擇供應商後自動帶入推薦模型</small>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="apiEnabled" id="apiEnabled" value="true">
                                    <label class="form-check-label fw-bold" for="apiEnabled">
                                        <i class="ti ti-sparkles me-1 text-warning"></i>啟用 AI 文章生成
                                    </label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold py-3 rounded-3">
                            <i class="ti ti-rocket me-2"></i>建立帳號
                        </button>
                    </form>

                    <script>
                        const DEFAULT_MODELS = {
                            'openrouter': 'moonshotai/kimi-k2-6-free',
                            'gemini': 'gemini-2.0-flash-lite-001',
                            'openai': 'gpt-4o-mini',
                            'github': 'gpt-4o'
                        };
                        function updateDefaultModel(provider) {
                            const modelInput = document.getElementById('apiModel');
                            const hint = document.getElementById('modelHint');
                            if (DEFAULT_MODELS[provider]) {
                                modelInput.placeholder = '預設: ' + DEFAULT_MODELS[provider];
                                hint.textContent = '留空則使用預設模型: ' + DEFAULT_MODELS[provider];
                            } else {
                                modelInput.placeholder = '使用預設模型';
                                hint.textContent = '選擇供應商後自動帶入推薦模型';
                            }
                        }
                    </script>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted mb-3">已經有帳號？</p>
                        <a th:href="@{/login}" class="btn btn-outline-primary fw-bold px-4">
                            <i class="ti ti-login me-1"></i>直接登入
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
