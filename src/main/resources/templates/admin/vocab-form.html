<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${mode} == 'new' ? '新增單字' : '編輯單字'">單字表單</title>
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-primary-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-pencil text-primary fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-primary mb-0"
                   th:text="${mode} == 'new' ? '新增單字' : '編輯單字'">單字表單</h2>
            </div>
        </div>
        <a th:href="@{/admin/vocabularies}" class="btn btn-outline-secondary">
            <i class="ti ti-arrow-left me-1"></i>返回列表
        </a>
    </div>

    <div class="card form-card">
        <div class="card-body p-4">
            <form th:action="${mode} == 'new' ? @{/admin/vocabularies} : @{/admin/vocabularies/{id}(id=${vocabulary.id})}"
                  method="post">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold"><i class="ti ti-letter-a me-1"></i>英文單字</label>
                        <input type="text" name="english" class="form-control" required
                               maxlength="50" th:value="${vocabulary.english}" placeholder="例如：apple">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold"><i class="ti ti-language me-1"></i>中文意思</label>
                        <input type="text" name="chinese" class="form-control" required
                               maxlength="100" th:value="${vocabulary.chinese}" placeholder="例如：蘋果">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold"><i class="ti ti-speakerphone me-1"></i>音標</label>
                        <input type="text" name="phonetic" class="form-control"
                               maxlength="100" th:value="${vocabulary.phonetic}" placeholder="例如：/ˈæp.əl/">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold"><i class="ti ti-category me-1"></i>主題分類</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">請選擇主題...</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${vocabulary.category != null && vocabulary.category.id == cat.id}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold"><i class="ti ti-school me-1"></i>適用年級</label>
                        <select name="grade" class="form-select">
                            <option value="" th:selected="${vocabulary.grade == null || vocabulary.grade == ''}">不分年級</option>
                            <option value="3" th:selected="${vocabulary.grade == '3'}">國小3年級</option>
                            <option value="4" th:selected="${vocabulary.grade == '4'}">國小4年級</option>
                            <option value="5" th:selected="${vocabulary.grade == '5'}">國小5年級</option>
                            <option value="6" th:selected="${vocabulary.grade == '6'}">國小6年級</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold"><i class="ti ti-photo me-1"></i>圖片路徑（選填）</label>
                        <input type="text" name="image" class="form-control"
                               maxlength="100" th:value="${vocabulary.image}" placeholder="例如：/images/apple.jpg">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold"><i class="ti ti-message-circle me-1"></i>英文例句</label>
                        <textarea name="exampleEn" class="form-control" rows="2" maxlength="500"
                                  placeholder="請輸入英文例句..."
                                  th:text="${vocabulary.exampleEn}"></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold"><i class="ti ti-language me-1"></i>中文翻譯</label>
                        <textarea name="exampleCn" class="form-control" rows="2" maxlength="500"
                                  placeholder="請輸入中文翻譯..."
                                  th:text="${vocabulary.exampleCn}"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary fw-bold px-4">
                        <i class="ti ti-device-floppy me-1"></i>儲存
                    </button>
                    <a th:href="@{/admin/vocabularies}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
