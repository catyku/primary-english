<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>單字管理</title>
    <link rel="stylesheet" th:href="@{/css/admin-list.css}">
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-primary-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-database text-primary fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-primary mb-0">單字管理</h2>
                <p class="text-muted mb-0">新增、編輯、刪除單字資料</p>
            </div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/vocabularies/new}" class="btn btn-primary fw-bold">
                <i class="ti ti-plus me-1"></i>新增單字
            </a>
            <a th:href="@{/admin/articles}" class="btn btn-outline-secondary">
                <i class="ti ti-book-2 me-1"></i>文章管理
            </a>
        </div>
    </div>

    <!-- Alerts -->
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="ti ti-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
        <i class="ti ti-alert-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter Bar -->
    <div class="card admin-card mb-4">
        <div class="card-body p-3">
            <form class="d-flex gap-3 flex-wrap align-items-end" th:action="@{/admin/vocabularies}" method="get">
                <div class="search-box">
                    <label class="small text-muted fw-bold mb-1"><i class="ti ti-search me-1"></i>關鍵字搜尋</label>
                    <input type="text" name="keyword" class="form-control" placeholder="英文或中文..."
                           th:value="${keyword}">
                </div>
                <div>
                    <label class="small text-muted fw-bold mb-1"><i class="ti ti-filter me-1"></i>主題分類</label>
                    <select name="category" class="form-select">
                        <option value="">全部主題</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}"
                                th:text="${cat.name}" th:selected="${currentCategory != null && currentCategory == cat.id}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-outline-primary">
                    <i class="ti ti-search"></i> 搜尋
                </button>
                <a th:href="@{/admin/vocabularies}" class="btn btn-outline-secondary">
                    <i class="ti ti-refresh"></i> 重置
                </a>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card admin-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table admin-table mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>英文</th>
                            <th>中文</th>
                            <th>音標</th>
                            <th>主題</th>
                            <th>年級</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${vocabularies}">
                            <td class="text-muted small" th:text="${v.id}"></td>
                            <td>
                                <span class="fw-bold text-primary" th:text="${v.english}"></span>
                            </td>
                            <td th:text="${v.chinese}"></td>
                            <td class="text-muted fst-italic" th:text="${v.phonetic}"></td>
                            <td>
                                <span class="badge bg-primary-soft text-primary" th:text="${v.category?.name}"></span>
                            </td>
                            <td><span class="badge grade-badge" th:text="'國小' + ${v.grade}"></span></td>
                            <td>
                                <a th:href="@{/admin/vocabularies/{id}/edit(id=${v.id})}"
                                   class="btn btn-outline-primary btn-xs me-1">
                                    <i class="ti ti-edit"></i> 編輯
                                </a>
                                <form th:action="@{/admin/vocabularies/{id}/delete(id=${v.id})}" method="post"
                                      class="d-inline"
                                      onsubmit="return confirmDelete();">
                                    <button type="submit" class="btn btn-outline-danger btn-xs">
                                        <i class="ti ti-trash"></i> 刪除
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${vocabularies == null || vocabularies.isEmpty()}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="ti ti-inbox display-4"></i>
                                <p class="mt-2">沒有符合條件的單字</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script layout:fragment="scripts" th:src="@{/js/vocab-list.js}"></script>

</body>
</html>
