<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${mode} == 'new' ? '新增文章' : '編輯文章'">文章表單</title>
    <style>
        .form-card { border: none; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.06); }
        .question-box { border-left: 4px solid #6366f1; background: #f8fafc; border-radius: 0 8px 8px 0; }
        .btn-add-q { background: #eef2ff; color: #6366f1; border: 1px dashed #c7d2fe; }
        .btn-add-q:hover { background: #e0e7ff; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-success-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-pencil text-success fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-success mb-0"
                   th:text="${mode} == 'new' ? '新增文章' : '編輯文章'">文章表單</h2>
            </div>
        </div>
        <a th:href="@{/admin/articles}" class="btn btn-outline-secondary">
            <i class="ti ti-arrow-left me-1"></i>返回列表
        </a>
    </div>

    <form th:action="${mode} == 'new' ? @{/admin/articles} : @{/admin/articles/{id}(id=${article.id})}"
          method="post">

        <!-- Basic Info -->
        <div class="card form-card mb-4">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3 text-primary"><i class="ti ti-info-circle me-2"></i>基本資訊</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">英文標題</label>
                        <input type="text" name="title" class="form-control" required
                               maxlength="200" th:value="${article.title}" placeholder="例如：My Pet Dog">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">中文標題</label>
                        <input type="text" name="titleCn" class="form-control" required
                               maxlength="100" th:value="${article.titleCn}" placeholder="例如：我的寵物狗">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">難度</label>
                        <select name="level" class="form-select" required>
                            <option value="easy" th:selected="${article.level} == 'easy'">簡單</option>
                            <option value="medium" th:selected="${article.level} == 'medium'">中等</option>
                            <option value="hard" th:selected="${article.level} == 'hard'">困難</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">適用年級</label>
                        <select name="grade" class="form-select" required>
                            <option value="3" th:selected="${article.grade} == '3'">國小3年級</option>
                            <option value="4" th:selected="${article.grade} == '4'">國小4年級</option>
                            <option value="5" th:selected="${article.grade} == '5'">國小5年級</option>
                            <option value="6" th:selected="${article.grade} == '6'">國小6年級</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">主題</label>
                        <input type="text" name="topic" class="form-control" required
                               maxlength="50" th:value="${article.topic}" placeholder="例如：Animals">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">英文內容</label>
                        <textarea name="content" class="form-control" rows="8" required maxlength="5000"
                                  placeholder="請輸入英文文章內容..."
                                  th:text="${article.content}"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">中文翻譯（選填）</label>
                        <textarea name="contentCn" class="form-control" rows="4" maxlength="1000"
                                  placeholder="請輸入中文翻譯..."
                                  th:text="${article.contentCn}"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Questions -->
        <div class="card form-card mb-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0 text-primary">
                        <i class="ti ti-help-circle me-2"></i>理解題目
                    </h5>
                    <span class="text-muted small">每篇文章建議 3-5 題</span>
                </div>

                <div id="questionsContainer">
                    <!-- JS will populate questions here -->
                </div>

                <button type="button" class="btn btn-add-q w-100 py-2 mt-2" onclick="addQuestion()">
                    <i class="ti ti-plus me-1"></i>新增題目
                </button>
            </div>
        </div>

        <div class="d-flex gap-2 mb-5">
            <button type="submit" class="btn btn-success fw-bold px-4">
                <i class="ti ti-device-floppy me-1"></i>儲存
            </button>
            <a th:href="@{/admin/articles}" class="btn btn-outline-secondary">取消</a>
        </div>
    </form>

</div>

<script layout:fragment="scripts">
    var questionCount = 0;
    var existingQuestions = /*[[${article.questions}]]*/ [];

    function addQuestion(data) {
        questionCount++;
        var idx = questionCount;
        var q = data || {};
        var html = '<div class="question-box p-3 mb-3" id="q_box_' + idx + '"'> +
            '<div class="d-flex justify-content-between align-items-center mb-2">' +
                '<span class="fw-bold text-primary">Q' + idx + '</span>' +
                '<button type="button" class="btn btn-outline-danger btn-xs" onclick="removeQuestion(' + idx + ')">' +
                    '<i class="ti ti-trash"></i> 刪除</button>' +
            '</div>' +
            '<input type="text" name="q_question_' + idx + '" class="form-control mb-2" required' +
                ' placeholder="請輸入問題" value="' + (q.question || '') + '" maxlength="500">' +
            '<div class="row g-2 mb-2">' +
                '<div class="col-md-6"><input type="text" name="q_optA_' + idx + '" class="form-control" required' +
                    ' placeholder="選項 A" value="' + (q.optionA || '') + '" maxlength="200"></div>' +
                '<div class="col-md-6"><input type="text" name="q_optB_' + idx + '" class="form-control" required' +
                    ' placeholder="選項 B" value="' + (q.optionB || '') + '" maxlength="200"></div>' +
                '<div class="col-md-6"><input type="text" name="q_optC_' + idx + '" class="form-control" required' +
                    ' placeholder="選項 C" value="' + (q.optionC || '') + '" maxlength="200"></div>' +
                '<div class="col-md-6"><input type="text" name="q_optD_' + idx + '" class="form-control" required' +
                    ' placeholder="選項 D" value="' + (q.optionD || '') + '" maxlength="200"></div>' +
            '</div>' +
            '<select name="q_answer_' + idx + '" class="form-select form-select-sm" style="max-width:120px;">' +
                '<option value="A" ' + ((q.correctAnswer||'A')=='A'?'selected':'') + '>正確答案：A</option>' +
                '<option value="B" ' + ((q.correctAnswer||'')=='B'?'selected':'') + '>正確答案：B</option>' +
                '<option value="C" ' + ((q.correctAnswer||'')=='C'?'selected':'') + '>正確答案：C</option>' +
                '<option value="D" ' + ((q.correctAnswer||'')=='D'?'selected':'') + '>正確答案：D</option>' +
            '</select>' +
        '</div>';
        var container = document.getElementById('questionsContainer');
        var div = document.createElement('div');
        div.innerHTML = html;
        container.appendChild(div.firstElementChild);
    }

    function removeQuestion(idx) {
        var box = document.getElementById('q_box_' + idx);
        if (box) box.remove();
    }

    // Initialize: load existing questions or add 5 empty ones
    document.addEventListener('DOMContentLoaded', function() {
        if (existingQuestions && existingQuestions.length > 0) {
            existingQuestions.forEach(function(q) { addQuestion(q); });
        } else {
            for (var i = 0; i < 5; i++) addQuestion();
        }
    });
</script>
</body>
</html>
