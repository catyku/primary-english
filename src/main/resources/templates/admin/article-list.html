<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>文章管理</title>
    <style>
        .admin-card { border: none; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.06); }
        .admin-table th { background: #f8fafc; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; }
        .admin-table td { vertical-align: middle; }
        .btn-xs { padding: .2rem .5rem; font-size: .8rem; }
        .article-preview { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-success-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-book-2 text-success fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-success mb-0">文章管理</h2>
                <p class="text-muted mb-0">新增、編輯、刪除閱讀文章與題目</p>
            </div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/articles/generate}" class="btn btn-primary fw-bold">
                <i class="ti ti-sparkles me-1"></i>🤖 AI 生成
            </a>
            <a th:href="@{/admin/articles/new}" class="btn btn-success fw-bold">
                <i class="ti ti-plus me-1"></i>新增文章
            </a>
            <a th:href="@{/admin/vocabularies}" class="btn btn-outline-secondary">
                <i class="ti ti-database me-1"></i>單字管理
            </a>
        </div>
    </div>

    <!-- Alerts -->
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="ti ti-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
        <i class="ti ti-alert-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card admin-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table admin-table mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>標題</th>
                            <th>中文標題</th>
                            <th>難度</th>
                            <th>年級</th>
                            <th>主題</th>
                            <th>字數</th>
                            <th>題數</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${articles}">
                            <td class="text-muted small" th:text="${a.id}"></td>
                            <td class="fw-bold" th:text="${a.title}"></td>
                            <td class="text-muted small" th:text="${a.titleCn}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${a.level} == 'easy' ? 'level-badge-easy' :
                                                      (${a.level} == 'medium' ? 'level-badge-medium' : 'level-badge-hard')"
                                      th:text="${a.level} == 'easy' ? '簡單' :
                                              (${a.level} == 'medium' ? '中等' : '困難')"
                                ></span>
                            </td>
                            <td><span class="badge grade-badge" th:text="'國小' + ${a.grade}"></span></td>
                            <td th:text="${a.topic}"></td>
                            <td th:text="${a.wordCount}"></td>
                            <td><span class="badge bg-info-soft text-info" th:text="${#lists.size(a.questions)}"></span></td>
                            <td>
                                <a th:href="@{/admin/articles/{id}/edit(id=${a.id})}"
                                   class="btn btn-outline-success btn-xs me-1">
                                    <i class="ti ti-edit"></i> 編輯
                                </a>
                                <form th:action="@{/admin/articles/{id}/delete(id=${a.id})}" method="post"
                                      class="d-inline"
                                      onsubmit="return confirm('確定要刪除這篇文章嗎？文章的所有題目也會一併刪除。');">
                                    <button type="submit" class="btn btn-outline-danger btn-xs">
                                        <i class="ti ti-trash"></i> 刪除
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${articles == null || articles.isEmpty()}">
                            <td colspan="9" class="text-center py-5 text-muted">
                                <i class="ti ti-inbox display-4"></i>
                                <p class="mt-2">沒有閱讀文章</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
