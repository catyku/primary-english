<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${quizType}">聽力測驗</title>
    <style>
        .quiz-card { transition: all 0.3s ease; border: 2px solid #e9ecef; }
        .quiz-card.correct { border-color: #198754 !important; background-color: #d1e7dd; }
        .quiz-card.wrong { border-color: #dc3545 !important; background-color: #f8d7da; }
        .option-btn { transition: all 0.2s; }
        .option-btn:hover { transform: translateY(-2px); }
        .option-btn.correct-answer { background-color: #198754 !important; color: white !important; border-color: #198754 !important; }
        .score-badge { font-size: 1.2rem; }
        .quiz-progress { height: 8px; border-radius: 4px; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-info-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-headphones text-info fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-info mb-0" th:text="${quizType}">聽力測驗</h2>
                <p class="text-muted mb-0">聽英文發音，選出正確的中文意思</p>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="badge bg-primary score-badge">
                <i class="ti ti-star me-1"></i>得分: <span id="score">0</span>/<span id="total">0</span>
            </span>
            <a th:href="@{/vocabulary}" class="btn btn-outline-secondary">
                <i class="ti ti-arrow-left me-1"></i>回單字學習
            </a>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress quiz-progress mb-4">
        <div class="progress-bar bg-info" id="progressBar" role="progressbar" style="width: 0%"></div>
    </div>

    <!-- Filter Info -->
    <div class="alert alert-light border mb-4" th:if="${param.category != null || param.grade != null}">
        <i class="ti ti-filter me-2"></i>
        <span th:if="${param.grade != null}" th:text="'年級篩選：國小' + ${param.grade} + '年級'"></span>
        <span th:if="${param.category != null}" th:text="'主題篩選'"></span>
        <span class="text-muted">（共 <span id="vocabCount">0</span> 題）</span>
    </div>

    <!-- Quiz Container -->
    <div id="quizContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-info" role="status">
                <span class="visually-hidden">載入中...</span>
            </div>
            <p class="mt-2 text-muted">載入測驗題目...</p>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="ti ti-trophy me-2"></i>測驗完成！</h5>
                </div>
                <div class="modal-body text-center py-4">
                    <div class="display-1 mb-3" id="resultEmoji">🎉</div>
                    <h3 class="mb-2">你的得分</h3>
                    <div class="display-4 fw-bold text-info mb-3">
                        <span id="finalScore">0</span> / <span id="finalTotal">0</span>
                    </div>
                    <div class="progress mb-3" style="height: 20px;">
                        <div class="progress-bar" id="resultProgress" role="progressbar" style="width: 0%"></div>
                    </div>
                    <p class="text-muted" id="resultMessage">繼續加油！</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button class="btn btn-info" onclick="location.reload()">
                        <i class="ti ti-refresh me-1"></i>再測一次
                    </button>
                    <a th:href="@{/vocabulary}" class="btn btn-outline-secondary">
                        <i class="ti ti-book me-1"></i>回單字學習
                    </a>
                </div>
            </div>
        </div>
    </div>

    <input type="hidden" id="vocabData" th:value="${vocabularies}" />

    <script th:inline="javascript">
        var quizVocabularies = /*[[${vocabularies}]]*/ [];
    </script>

</div>

<script layout:fragment="scripts">
    var vocabularies = (typeof quizVocabularies !== 'undefined') ? quizVocabularies : [];
    try {
        if (typeof vocabularies === 'string') {
            vocabularies = JSON.parse(vocabularies);
        }
    } catch (e) {
        console.error('JSON parse failed:', e);
        vocabularies = [];
    }

    var currentIndex = 0;
    var score = 0;
    var answered = false;

    function initQuiz() {
        if (vocabularies.length === 0) {
            document.getElementById('quizContainer').innerHTML =
                '<div class="alert alert-warning text-center"><i class="ti ti-alert-circle me-2"></i>沒有可用的單字資料，請先選擇分類或年級</div>';
            return;
        }

        vocabularies = shuffleArray(vocabularies.slice());
        if (vocabularies.length > 20) {
            vocabularies = vocabularies.slice(0, 20);
        }

        document.getElementById('total').textContent = vocabularies.length;
        var vocabCountEl = document.getElementById('vocabCount');
        if (vocabCountEl) {
            vocabCountEl.textContent = vocabularies.length;
        }
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= vocabularies.length) {
            showResult();
            return;
        }

        answered = false;
        var vocab = vocabularies[currentIndex];
        var options = generateOptions(vocab);

        var html = '<div class="quiz-card card border-0 shadow-sm mb-4">' +
            '<div class="card-body p-4">' +
            '<div class="d-flex justify-content-between align-items-center mb-3">' +
            '<span class="badge bg-info-soft text-info">第 ' + (currentIndex + 1) + ' / ' + vocabularies.length + ' 題</span>' +
            '<button class="btn btn-outline-info btn-sm rounded-pill" onclick="speakWord()">' +
            '<i class="ti ti-volume"></i> 播放發音' +
            '</button>' +
            '</div>' +
            '<div class="text-center mb-4">' +
            '<h3 class="fw-bold text-primary display-6" id="currentWord">' + escapeHtml(vocab.english) + '</h3>' +
            '<p class="text-muted" id="currentPhonetic">' + escapeHtml(vocab.phonetic || '') + '</p>' +
            '</div>' +
            '<div class="row g-3">';

        options.forEach(function(opt) {
            html += '<div class="col-md-6">' +
                '<button class="option-btn btn btn-outline-primary w-100 py-3 fw-bold" ' +
                'onclick="selectOption(this, ' + opt.correct + ')" ' +
                'data-correct="' + opt.correct + '">' +
                escapeHtml(opt.text) +
                '</button></div>';
        });

        html += '</div>' +
            '<div class="mt-3 text-center" id="feedback" style="display:none;">' +
            '<div class="alert" role="alert"></div>' +
            '<button class="btn btn-primary" onclick="nextQuestion()">下一題 <i class="ti ti-arrow-right"></i></button>' +
            '</div>' +
            '</div></div>';

        document.getElementById('quizContainer').innerHTML = html;

        setTimeout(function() {
            speakWord();
        }, 500);

        updateProgress();
    }

    function generateOptions(correctVocab) {
        var correct = { text: correctVocab.chinese, correct: true };
        var wrongOptions = vocabularies
            .filter(function(v) { return v.english !== correctVocab.english; })
            .map(function(v) { return { text: v.chinese, correct: false }; })
            .slice(0, 20);

        // Randomly pick 3 wrong options
        wrongOptions = shuffleArray(wrongOptions).slice(0, 3);

        // Fill with generic if not enough
        while (wrongOptions.length < 3) {
            wrongOptions.push({ text: '其他選項', correct: false });
        }

        var allOptions = [correct].concat(wrongOptions);
        return shuffleArray(allOptions);
    }

    function selectOption(btn, isCorrect) {
        if (answered) return;
        answered = true;

        var buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(function(b) {
            b.disabled = true;
            if (b.getAttribute('data-correct') === 'true') {
                b.classList.add('correct-answer');
            }
        });

        var feedback = document.getElementById('feedback');
        var alertDiv = feedback.querySelector('.alert');

        if (isCorrect) {
            score++;
            document.getElementById('score').textContent = score;
            btn.classList.add('correct');
            alertDiv.className = 'alert alert-success';
            alertDiv.innerHTML = '<i class="ti ti-check-circle me-2"></i>答對了！🎉';
        } else {
            btn.classList.add('wrong');
            alertDiv.className = 'alert alert-danger';
            alertDiv.innerHTML = '<i class="ti ti-x me-2"></i>答錯了，正確答案是：' +
                escapeHtml(vocabularies[currentIndex].chinese);
        }

        feedback.style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        showQuestion();
    }

    function updateProgress() {
        var pct = ((currentIndex / vocabularies.length) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
    }

    function showResult() {
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalTotal').textContent = vocabularies.length;

        var pct = (score / vocabularies.length) * 100;
        var progressBar = document.getElementById('resultProgress');
        progressBar.style.width = pct + '%';

        if (pct >= 80) {
            progressBar.className = 'progress-bar bg-success';
            document.getElementById('resultEmoji').textContent = '🏆';
            document.getElementById('resultMessage').textContent = '太棒了！你是單字小達人！';
        } else if (pct >= 60) {
            progressBar.className = 'progress-bar bg-info';
            document.getElementById('resultEmoji').textContent = '⭐';
            document.getElementById('resultMessage').textContent = '表現不錯！繼續努力！';
        } else {
            progressBar.className = 'progress-bar bg-warning';
            document.getElementById('resultEmoji').textContent = '💪';
            document.getElementById('resultMessage').textContent = '再多練習，你會越來越好！';
        }

        var modalEl = document.getElementById('resultModal');
        var modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
    }

    function speakWord() {
        if (currentIndex < vocabularies.length && vocabularies[currentIndex]) {
            speak(vocabularies[currentIndex].english, 'en-US');
        }
    }

    function shuffleArray(array) {
        for (var i = array.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', initQuiz);
</script>

</body>
</html>
