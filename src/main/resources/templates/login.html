<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>登入</title>
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center align-items-center form-card-wrapper">
        <div class="col-11 col-sm-8 col-md-6 col-lg-5 col-xl-4">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- Header -->
                <div class="text-center py-5 position-relative form-header"
                     style="background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);">
                    <div class="position-absolute top-0 start-0 p-3 opacity-25 form-header-decoration-1">🔐</div>
                    <div class="position-absolute bottom-0 end-0 p-3 opacity-25 form-header-decoration-2">✨</div>

                    <div class="position-relative">
                        <div class="bg-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow form-icon-wrapper">
                            <i class="ti ti-login text-primary fs-1"></i>
                        </div>
                        <h2 class="fw-bold text-white m-0">歡迎回來！</h2>
                        <p class="text-white-75 mb-0 mt-2">輸入帳號密碼繼續學習 🎒</p>
                    </div>
                </div>

                <!-- Body -->
                <div class="card-body p-4 p-md-5">

                    <div th:if="${errorMsg}" class="alert alert-danger rounded-3 d-flex align-items-center">
                        <i class="ti ti-alert-circle me-2 fs-5"></i>
                        <span th:text="${errorMsg}"></span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger rounded-3 d-flex align-items-center">
                        <i class="ti ti-alert-circle me-2 fs-5"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <div th:if="${success}" class="alert alert-success rounded-3 d-flex align-items-center">
                        <i class="ti ti-check-circle me-2 fs-5"></i>
                        <span th:text="${success}"></span>
                    </div>

                    <form th:action="@{/do-login}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">
                                <i class="ti ti-user me-1 text-primary"></i>使用者名稱
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="ti ti-user text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control form-control-lg bg-light border-start-0 ps-0"
                                       required placeholder="輸入你的名稱" autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">
                                <i class="ti ti-lock me-1 text-primary"></i>密碼
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="ti ti-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control form-control-lg bg-light border-start-0 ps-0"
                                       required placeholder="輸入密碼">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold py-3 rounded-3">
                            <i class="ti ti-login me-2"></i>登入
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted mb-3">還沒有帳號？</p>
                        <a th:href="@{/register}" class="btn btn-outline-primary fw-bold px-4">
                            <i class="ti ti-user-plus me-1"></i>註冊新帳號
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
