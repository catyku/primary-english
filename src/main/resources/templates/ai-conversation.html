<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>🤖 AI 英文語音對話 — 英文單字樂園</title>
    <link rel="stylesheet" th:href="@{/css/ai-conversation.css}">
</head>
<body>
<div layout:fragment="content">

    <!-- 標題 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-primary-soft rounded-circle d-flex align-items-center justify-content-center me-3"
                 style="width:64px;height:64px;">
                <span style="font-size:2rem;">🤖</span>
            </div>
            <div>
                <h2 class="fw-bold text-primary mb-0">AI 英文語音對話</h2>
                <p class="text-muted mb-0">和 AI 老師用英文聊天，主題由 AI 挑選，練習你學過的單字！</p>
            </div>
        </div>
        <a th:href="@{/profile}" class="btn btn-outline-secondary">
            <i class="ti ti-arrow-left me-1"></i>返回個人資料
        </a>
    </div>

    <!-- 未啟用 AI 提示 -->
    <div th:if="${!apiEnabled}" class="alert alert-warning rounded-4 mb-4">
        <div class="d-flex align-items-center">
            <span class="fs-1 me-3">⚠️</span>
            <div>
                <strong>AI 對話功能尚未啟用</strong><br>
                請先到「個人資料」設定 AI API 供應商與金鑰，並啟用 AI 功能。
                <a th:href="@{/profile}" class="btn btn-sm btn-warning fw-bold ms-2">前往設定 →</a>
            </div>
        </div>
    </div>

    <!-- 設定面板 -->
    <div class="card setup-card mb-4">
        <div class="card-body p-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold">
                        <i class="ti ti-school me-1 text-primary"></i>適用年級
                    </label>
                    <select id="gradeSelect" class="form-select form-select-lg">
                        <option value="3" selected>🎒 國小 3 年級</option>
                        <option value="4">📚 國小 4 年級</option>
                        <option value="5">✏️ 國小 5 年級</option>
                        <option value="6">🎓 國小 6 年級</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">
                        <i class="ti ti-chart-bar me-1 text-primary"></i>難度
                    </label>
                    <select id="difficultySelect" class="form-select form-select-lg">
                        <option value="easy">🟢 簡單</option>
                        <option value="medium" selected>🟡 中等</option>
                        <option value="hard">🔴 困難</option>
                    </select>
                </div>
                <div class="col-md-6 d-flex justify-content-md-end">
                    <button id="startBtn" class="start-convo-btn" onclick="startConversation()"
                            th:disabled="${!apiEnabled}">
                        <i class="ti ti-player-play"></i>
                        🚀 開始新對話
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主題標籤（對話中顯示） -->
    <div id="topicDisplay" class="d-none mb-3">
        <span class="topic-tag">
            <i class="ti ti-message-circle"></i>
            主題：<span id="topicText">---</span>
        </span>
        <button class="btn btn-sm btn-outline-danger ms-2 rounded-pill" onclick="endConversation()">
            <i class="ti ti-x me-1"></i>結束對話
        </button>
    </div>

    <!-- 提示 -->
    <div class="tip-box mb-3 d-none" id="speechTip">
        <i class="ti ti-info-circle me-1"></i>
        <span id="speechTipText">按 🎤 麥克風按鈕開始說英文，說完會自動送出。也可以用鍵盤輸入後按 ➤ 送出。</span>
    </div>

    <!-- 對話區 -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body p-0">
            <div id="chatContainer" class="chat-container">
                <div class="empty-chat">
                    <div class="empty-emoji">🎙️</div>
                    <h4 class="fw-bold mt-3">準備好練習英文對話了嗎？</h4>
                    <p>點「開始新對話」，AI 老師會選一個有趣的主題<br>用你已學過的單字來陪你聊天！</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 輸入區 -->
    <div class="chat-input-area" id="inputArea" style="opacity:0.5;pointer-events:none;">
        <button id="micBtn" class="mic-btn" title="按住說話（需要瀏覽器支援語音輸入）">
            <i class="ti ti-microphone fs-5"></i>
        </button>
        <input type="text" id="textInput" class="chat-input"
               placeholder="輸入英文回答..." maxlength="500"
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" class="send-btn" onclick="sendMessage()">
            <i class="ti ti-send fs-5"></i>
        </button>
    </div>

    <div class="text-center mt-2">
        <span class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">等待開始</span>
        </span>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/ai-conversation.js}"></script>
</th:block>

</body>
</html>
