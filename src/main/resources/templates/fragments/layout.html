<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE — 英文單字樂園">英文單字樂園</title>
    <link rel="stylesheet" th:href="@{/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/tabler-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        /* TTS Setting Panel Modal Styles */
        .tts-setting-modal .modal-content { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .tts-setting-modal .modal-header { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border-radius: 16px 16px 0 0; border-bottom: none; padding: 1.25rem 1.5rem; }
        .tts-setting-modal .modal-title { color: #fff; font-weight: 700; }
        .tts-setting-modal .btn-close-white { filter: invert(1) grayscale(100%) brightness(200%); }
        .tts-slider-track { position: relative; width: 100%; }
        .tts-slider { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; background: #e9ecef; outline: none; cursor: pointer; }
        .tts-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.35); transition: transform .15s; }
        .tts-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .tts-slider::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.35); }
        .tts-value-badge { min-width: 3.5rem; text-align: center; font-weight: 700; color: #6366f1; background: #eef2ff; border-radius: 8px; padding: .2rem .5rem; font-size: .9rem; }
        .tts-gender-group .form-check-input:checked { background-color: #6366f1; border-color: #6366f1; }
        .tts-gender-group .form-check-label { cursor: pointer; }
        .tts-btn-test { background: linear-gradient(135deg, #10b981, #059669); border: none; color: #fff; font-weight: 600; }
        .tts-btn-test:hover { background: linear-gradient(135deg, #059669, #047857); color: #fff; }
        .tts-btn-reset { background: #f3f4f6; border: 1px solid #d1d5db; color: #374151; font-weight: 600; }
        .tts-btn-reset:hover { background: #e5e7eb; }
        .nav-gear-btn { border: none; background: transparent; color: rgba(255,255,255,.85); padding: .375rem .5rem; border-radius: 8px; transition: all .2s; }
        .nav-gear-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" th:href="@{/}">
                <span class="nav-icon-wrap me-2"><i class="ti ti-book"></i></span>英文單字樂園
            </a>
            <button class="navbar-toggler btn-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/}"><span class="nav-icon-wrap me-1"><i class="ti ti-home"></i></span>首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/vocabulary}"><span class="nav-icon-wrap me-1"><i class="ti ti-vocabulary"></i></span>單字學習</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                            <span class="nav-icon-wrap me-1"><i class="ti ti-school"></i></span>年級單字
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/vocabulary(grade='3')}"><span class="me-1">🎒</span> 國小3年級</a></li>
                            <li><a class="dropdown-item" th:href="@{/vocabulary(grade='4')}"><span class="me-1">📚</span> 國小4年級</a></li>
                            <li><a class="dropdown-item" th:href="@{/vocabulary(grade='5')}"><span class="me-1">✏️</span> 國小5年級</a></li>
                            <li><a class="dropdown-item" th:href="@{/vocabulary(grade='6')}"><span class="me-1">🎓</span> 國小6年級</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                            <span class="nav-icon-wrap me-1"><i class="ti ti-device-gamepad-2"></i></span>測驗遊戲
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/quiz/listen}"><span class="me-1">🎧</span> 聽力測驗</a></li>
                            <li><a class="dropdown-item" th:href="@{/quiz/spell}"><span class="me-1">✏️</span> 拼字測驗</a></li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- TTS Settings Gear -->
                    <li class="nav-item">
                        <button class="nav-gear-btn" type="button" data-bs-toggle="modal" data-bs-target="#ttsSettingModal" title="語音設定">
                            <i class="ti ti-settings fs-5"></i>
                        </button>
                    </li>
                    <li class="nav-item" th:if="${session.USER_NAME == null}">
                        <a class="nav-link text-white" th:href="@{/login}">
                            <span class="nav-icon-wrap me-1"><i class="ti ti-login"></i></span>登入
                        </a>
                    </li>
                    <li class="nav-item" th:if="${session.USER_NAME == null}">
                        <a class="nav-link text-white" th:href="@{/register}">
                            <span class="nav-icon-wrap me-1"><i class="ti ti-user-plus"></i></span>註冊
                        </a>
                    </li>
                    <li class="nav-item dropdown" th:if="${session.USER_NAME != null}">
                        <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                            <span class="nav-icon-wrap me-1"><i class="ti ti-user-circle"></i></span>
                            <span th:text="${session.DISPLAY_NAME}">使用者</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">
                                <span class="nav-icon-wrap me-1"><i class="ti ti-chart-bar"></i></span>學習紀錄
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" th:href="@{/logout}">
                                <span class="nav-icon-wrap me-1"><i class="ti ti-logout"></i></span>登出
                            </a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-4">
        <div layout:fragment="content">
            <!-- Page content goes here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-glow text-center py-3 mt-auto">
        <div class="container">
            <small class="text-white-50">
                <i class="ti ti-heart-filled text-danger me-1" style="animation: heartbeat 1.5s ease-in-out infinite;"></i>
                國小英文單字互動學習系統 · Made for Kids <span style="animation: floatY 2s ease-in-out infinite;">🌟</span>
            </small>
        </div>
    </footer>

    <!-- TTS Settings Modal -->
    <div class="modal fade tts-setting-modal" id="ttsSettingModal" tabindex="-1" aria-labelledby="ttsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ttsModalLabel">
                        <i class="ti ti-speakerphone me-2"></i>語音朗讀設定
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- Rate -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label for="tts-rate" class="fw-bold text-dark mb-0"><i class="ti ti-speedboat me-1 text-primary"></i>語速</label>
                            <span class="tts-value-badge" id="tts-rate-val">0.85x</span>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <small class="text-muted">慢</small>
                            <div class="flex-grow-1">
                                <input type="range" class="tts-slider" id="tts-rate" min="0.3" max="2.0" step="0.05" value="0.85">
                            </div>
                            <small class="text-muted">快</small>
                        </div>
                    </div>

                    <!-- Pitch -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label for="tts-pitch" class="fw-bold text-dark mb-0"><i class="ti ti-wave-sine me-1 text-primary"></i>音調</label>
                            <span class="tts-value-badge" id="tts-pitch-val">1.0</span>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <small class="text-muted">低</small>
                            <div class="flex-grow-1">
                                <input type="range" class="tts-slider" id="tts-pitch" min="0.5" max="2.0" step="0.1" value="1.0">
                            </div>
                            <small class="text-muted">高</small>
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="mb-4 tts-gender-group">
                        <label class="fw-bold text-dark mb-2 d-block"><i class="ti ti-users me-1 text-primary"></i>語音偏好</label>
                        <div class="d-flex gap-2 flex-wrap">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tts-gender" id="tts-gender-any" value="any" checked>
                                <label class="form-check-label" for="tts-gender-any">
                                    <i class="ti ti-user me-1"></i>不限
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tts-gender" id="tts-gender-female" value="female">
                                <label class="form-check-label" for="tts-gender-female">
                                    <i class="ti ti-woman me-1"></i>女聲
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tts-gender" id="tts-gender-male" value="male">
                                <label class="form-check-label" for="tts-gender-male">
                                    <i class="ti ti-man me-1"></i>男聲
                                </label>
                            </div>
                        </div>
                        <div class="form-text text-muted mt-1">實際可用語音依瀏覽器與作業系統而定</div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 justify-content-between px-4 pb-4 pt-0">
                    <button type="button" class="btn tts-btn-reset" onclick="resetTTSSettings()">
                        <i class="ti ti-restore me-1"></i>恢復預設
                    </button>
                    <button type="button" class="btn tts-btn-test" id="tts-test" data-bs-dismiss="modal">
                        <i class="ti ti-player-play me-1"></i>試聽
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/speech.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <script layout:fragment="scripts"></script>
</body>
</html>
