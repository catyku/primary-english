<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>閱讀測驗</title>
    <style>
        .reading-card { transition: all .3s ease; border: none; }
        .reading-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,.08) !important; }
        .level-badge-easy { background: #d1fae5; color: #059669; }
        .level-badge-medium { background: #fef3c7; color: #d97706; }
        .level-badge-hard { background: #fee2e2; color: #dc2626; }
        .grade-badge { background: #eef2ff; color: #6366f1; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-success-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-book-2 text-success fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-success mb-0">閱讀測驗</h2>
                <p class="text-muted mb-0">閱讀英文短文，回答理解問題</p>
            </div>
        </div>
    </div>

    <!-- Filter -->
    <div class="mb-4">
        <div class="d-flex align-items-center mb-2">
            <i class="ti ti-filter text-muted me-2"></i>
            <span class="text-muted small fw-bold">難度篩選</span>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/reading}" class="btn btn-outline-success"
               th:classappend="${currentGrade == null && currentLevel == null} ? 'active' : ''">全部</a>
            <a th:href="@{/reading(level='easy')}" class="btn btn-outline-success"
               th:classappend="${currentLevel == 'easy'} ? 'active' : ''">簡單</a>
            <a th:href="@{/reading(level='medium')}" class="btn btn-outline-success"
               th:classappend="${currentLevel == 'medium'} ? 'active' : ''">中等</a>
            <a th:href="@{/reading(level='hard')}" class="btn btn-outline-success"
               th:classappend="${currentLevel == 'hard'} ? 'active' : ''">困難</a>
            <a th:href="@{/reading(grade='3')}" class="btn btn-outline-success"
               th:classappend="${currentGrade == '3'} ? 'active' : ''">國小3年級</a>
            <a th:href="@{/reading(grade='4')}" class="btn btn-outline-success"
               th:classappend="${currentGrade == '4'} ? 'active' : ''">國小4年級</a>
            <a th:href="@{/reading(grade='5')}" class="btn btn-outline-success"
               th:classappend="${currentGrade == '5'} ? 'active' : ''">國小5年級</a>
            <a th:href="@{/reading(grade='6')}" class="btn btn-outline-success"
               th:classappend="${currentGrade == '6'} ? 'active' : ''">國小6年級</a>
        </div>
    </div>

    <!-- Article Grid -->
    <div class="row g-4" th:if="${articles != null && !articles.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="article : ${articles}">
            <div class="card reading-card h-100 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge grade-badge"
                          th:text="'國小' + ${article.grade} + '年級'"></span>
                        <span class="badge"
                              th:classappend="${article.level} == 'easy' ? 'level-badge-easy' :
                                              (${article.level} == 'medium' ? 'level-badge-medium' : 'level-badge-hard')"
                              th:text="${article.level} == 'easy' ? '簡單' :
                                      (${article.level} == 'medium' ? '中等' : '困難')"
                        ></span>
                    </div>
                    <h5 class="card-title fw-bold text-dark mb-1" th:text="${article.title}">Title</h5>
                    <p class="text-muted small mb-2" th:text="${article.titleCn}">中文標題</p>
                    <div class="d-flex gap-3 text-muted small mb-3">
                        <span><i class="ti ti-tag me-1"></i><span th:text="${article.topic}"></span></span>
                        <span><i class="ti ti-text-recognition me-1"></i><span th:text="${article.wordCount}"></span> 字</span>
                        <span><i class="ti ti-help-circle me-1"></i><span th:text="${#lists.size(article.questions)}"></span> 題</span>
                    </div>
                    <a th:href="@{/reading/{id}(id=${article.id})}" class="btn btn-success w-100 fw-bold">
                        <i class="ti ti-book-open me-1"></i>開始閱讀
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center py-5 text-muted" th:if="${articles == null || articles.isEmpty()}">
        <div class="empty-state">
            <i class="ti ti-inbox display-1 text-muted"></i>
            <p class="mt-3 fs-5">目前沒有閱讀文章</p>
        </div>
    </div>

</div>
</body>
</html>
