<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="${quizType}">拼字測驗</title>
    <style>
        .quiz-card { transition: all 0.3s ease; border: 2px solid #e9ecef; }
        .quiz-card.correct { border-color: #198754 !important; background-color: #d1e7dd; }
        .quiz-card.wrong { border-color: #dc3545 !important; background-color: #f8d7da; }
        .spell-input { font-size: 1.5rem; letter-spacing: 0.1em; }
        .letter-hint { display: inline-block; width: 36px; height: 48px; line-height: 48px;
                        border-bottom: 3px solid var(--bs-primary); margin: 0 3px;
                        font-size: 1.5rem; font-weight: bold; text-align: center; }
        .letter-hint.filled { border-bottom-color: #198754; color: #198754; }
        .letter-hint.empty { color: #dee2e6; }
        .score-badge { font-size: 1.2rem; }
        .quiz-progress { height: 8px; border-radius: 4px; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center">
            <div class="section-icon bg-warning-soft rounded-circle d-flex align-items-center justify-content-center me-3">
                <i class="ti ti-pencil text-warning fs-3"></i>
            </div>
            <div>
                <h2 class="fw-bold text-warning mb-0" th:text="${quizType}">拼字測驗</h2>
                <p class="text-muted mb-0">聽中文意思，拼出正確的英文單字</p>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="badge bg-primary score-badge">
                <i class="ti ti-star me-1"></i>得分: <span id="score">0</span>/<span id="total">0</span>
            </span>
            <a th:href="@{/vocabulary}" class="btn btn-outline-secondary">
                <i class="ti ti-arrow-left me-1"></i>回單字學習
            </a>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress quiz-progress mb-4">
        <div class="progress-bar bg-warning" id="progressBar" role="progressbar" style="width: 0%"></div>
    </div>

    <!-- Filter Info -->
    <div class="alert alert-light border mb-4" th:if="${param.category != null || param.grade != null}">
        <i class="ti ti-filter me-2"></i>
        <span th:if="${param.grade != null}" th:text="'年級篩選：國小' + ${param.grade} + '年級'">年級篩選</span>
        <span th:if="${param.category != null}" th:text="'主題篩選'">主題篩選</span>
        <span class="text-muted">（共 <span th:text="${#lists.size(vocabularies)}">0</span> 題）</span>
    </div>

    <!-- Quiz Container -->
    <div id="quizContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">載入中...</span>
            </div>
            <p class="mt-2 text-muted">載入測驗題目...</p>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-white">
                    <h5 class="modal-title"><i class="ti ti-trophy me-2"></i>測驗完成！</h5>
                </div>
                <div class="modal-body text-center py-4">
                    <div class="display-1 mb-3" id="resultEmoji">🎉</div>
                    <h3 class="mb-2">你的得分</h3>
                    <div class="display-4 fw-bold text-warning mb-3">
                        <span id="finalScore">0</span> / <span id="finalTotal">0</span>
                    </div>
                    <div class="progress mb-3" style="height: 20px;">
                        <div class="progress-bar" id="resultProgress" role="progressbar" style="width: 0%"></div>
                    </div>
                    <p class="text-muted" id="resultMessage">繼續加油！</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button class="btn btn-warning" onclick="location.reload()">
                        <i class="ti ti-refresh me-1"></i>再測一次
                    </button>
                    <a th:href="@{/vocabulary}" class="btn btn-outline-secondary">
                        <i class="ti ti-book me-1"></i>回單字學習
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<script layout:fragment="scripts">
    // 詞彙資料
    var vocabularies = [];
    try {
        var rawData = /*[[${vocabularies}]]*/ [];
        if (rawData && rawData.length > 0) {
            vocabularies = rawData;
        }
    } catch (e) {
        console.error('Thymeleaf inline data failed:', e);
    }

    var currentIndex = 0;
    var score = 0;
    var answered = false;

    function initQuiz() {
        if (vocabularies.length === 0) {
            document.getElementById('quizContainer').innerHTML =
                '<div class="alert alert-warning text-center">' +
                '<i class="ti ti-alert-circle me-2"></i>沒有可用的單字資料，請先選擇分類或年級</div>';
            return;
        }

        vocabularies = shuffleArray(vocabularies.slice());
        if (vocabularies.length > 20) {
            vocabularies = vocabularies.slice(0, 20);
        }

        document.getElementById('total').textContent = vocabularies.length;
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= vocabularies.length) {
            showResult();
            return;
        }

        answered = false;
        var vocab = vocabularies[currentIndex];

        // Generate letter hints
        var word = vocab.english;
        var hintHtml = '';
        for (var i = 0; i < word.length; i++) {
            hintHtml += '<span class="letter-hint empty" id="hint_' + i + '" data-letter="' + word[i].toLowerCase() + '" data-index="' + i + '" onclick="fillLetter(\'' + i + '\')"></span>';
        }

        var html = '<div class="quiz-card card border-0 shadow-sm mb-4">' +
            '<div class="card-body p-4">' +
            '<div class="d-flex justify-content-between align-items-center mb-3">' +
            '<span class="badge bg-warning-soft text-warning">第 ' + (currentIndex + 1) + ' / ' + vocabularies.length + ' 題</span>' +
            '<button class="btn btn-outline-warning btn-sm rounded-pill" onclick="speak(\'' + escapeHtml(vocab.chinese) + '\', \'zh-TW\')">' +
            '<i class="ti ti-volume"></i> 播放中文' +
            '</button>' +
            '</div>' +
            '<div class="text-center mb-4">' +
            '<h4 class="fw-bold text-dark mb-2">請拼出這個單字：</h4>' +
            '<p class="text-muted fs-5">' + escapeHtml(vocab.chinese) + '</p>' +
            '<p class="text-muted">' + escapeHtml(vocab.phonetic || '') + '</p>' +
            '</div>' +
            '<div class="text-center mb-4" id="letterHints">' + hintHtml + '</div>' +
            '<div class="text-center mb-3">' +
            '<input type="text" id="spellInput" class="form-control spell-input text-center" ' +
            'placeholder="輸入英文單字..." maxlength="' + word.length + '" ' +
            'oninput="checkInput()" autocomplete="off">' +
            '</div>' +
            '<div class="text-center">' +
            '<button class="btn btn-warning fw-bold" onclick="submitAnswer()">確認答案</button>' +
            '</div>' +
            '<div class="mt-3 text-center" id="feedback" style="display:none;">' +
            '<div class="alert" role="alert"></div>' +
            '<button class="btn btn-primary" onclick="nextQuestion()">下一題 <i class="ti ti-arrow-right"></i></button>' +
            '</div>' +
            '</div></div>';

        document.getElementById('quizContainer').innerHTML = html;

        setTimeout(function() {
            speak(vocab.chinese, 'zh-TW');
        }, 500);

        updateProgress();
    }

    function checkInput() {
        var input = document.getElementById('spellInput').value.toLowerCase();
        var word = vocabularies[currentIndex].english.toLowerCase();
        var hints = document.querySelectorAll('.letter-hint');

        hints.forEach(function(hint, idx) {
            if (idx < input.length) {
                hint.textContent = input[idx].toUpperCase();
                if (input[idx] === word[idx]) {
                    hint.classList.remove('empty');
                    hint.classList.add('filled');
                } else {
                    hint.classList.remove('empty', 'filled');
                }
            } else {
                hint.textContent = '';
                hint.classList.remove('filled');
                hint.classList.add('empty');
            }
        });
    }

    function submitAnswer() {
        if (answered) return;
        answered = true;

        var input = document.getElementById('spellInput').value.toLowerCase().trim();
        var correct = vocabularies[currentIndex].english.toLowerCase();
        var isCorrect = input === correct;

        var feedback = document.getElementById('feedback');
        var alertDiv = feedback.querySelector('.alert');

        // Reveal all letters
        var hints = document.querySelectorAll('.letter-hint');
        hints.forEach(function(hint, idx) {
            hint.textContent = correct[idx].toUpperCase();
            if (idx < input.length && input[idx] === correct[idx]) {
                hint.classList.add('filled');
            } else {
                hint.classList.remove('empty', 'filled');
                hint.style.color = '#dc3545';
            }
        });

        if (isCorrect) {
            score++;
            document.getElementById('score').textContent = score;
            document.getElementById('quizContainer').querySelector('.quiz-card').classList.add('correct');
            alertDiv.className = 'alert alert-success';
            alertDiv.innerHTML = '<i class="ti ti-check-circle me-2"></i>答對了！🎉';
        } else {
            document.getElementById('quizContainer').querySelector('.quiz-card').classList.add('wrong');
            alertDiv.className = 'alert alert-danger';
            alertDiv.innerHTML = '<i class="ti ti-x me-2"></i>答錯了，正確答案是：<strong>' +
                escapeHtml(vocabularies[currentIndex].english) + '</strong>';
        }

        document.getElementById('spellInput').disabled = true;
        feedback.style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        showQuestion();
    }

    function updateProgress() {
        var pct = ((currentIndex / vocabularies.length) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
    }

    function showResult() {
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalTotal').textContent = vocabularies.length;

        var pct = (score / vocabularies.length) * 100;
        var progressBar = document.getElementById('resultProgress');
        progressBar.style.width = pct + '%';

        if (pct >= 80) {
            progressBar.className = 'progress-bar bg-success';
            document.getElementById('resultEmoji').textContent = '🏆';
            document.getElementById('resultMessage').textContent = '太棒了！你是拼字小達人！';
        } else if (pct >= 60) {
            progressBar.className = 'progress-bar bg-warning';
            document.getElementById('resultEmoji').textContent = '⭐';
            document.getElementById('resultMessage').textContent = '表現不錯！繼續努力！';
        } else {
            progressBar.className = 'progress-bar bg-secondary';
            document.getElementById('resultEmoji').textContent = '💪';
            document.getElementById('resultMessage').textContent = '再多練習，你會越來越好！';
        }

        var modal = new bootstrap.Modal(document.getElementById('resultModal'));
        modal.show();
    }

    function shuffleArray(array) {
        for (var i = array.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', initQuiz);
</script>

</body>
</html>
